name: Deploy Strova API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish APICore.API/APICore.API.csproj -c Release -o ./publish

      # Carpeta local "publish" → remoto /var/www/strova/publish/ (sin publish/publish anidado).
      # No usar "./publish/*" con target .../publish: el action creaba /var/www/strova/publish/publish/APICore.API.dll
      - name: Copiar al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          source: "publish"
          target: "/var/www/strova"
          rm: false

      - name: Crear appsettings y reiniciar servicio
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            if [ -d /var/www/strova/publish/publish ] && [ -f /var/www/strova/publish/publish/APICore.API.dll ]; then
              shopt -s dotglob nullglob
              mv /var/www/strova/publish/publish/* /var/www/strova/publish/
              rmdir /var/www/strova/publish/publish 2>/dev/null || true
            fi
            cat > /var/www/strova/publish/appsettings.json << 'EOF'
            {
              "Logging": {
                "LogLevel": {
                  "Default": "Information",
                  "Microsoft.AspNetCore": "Warning"
                }
              },
              "AllowedHosts": "*",
              "Cors": {
                "AllowedOrigins": [
                  "https://strova-store.vercel.app",
                  "https://inventory-admin-five.vercel.app"
                  "http://localhost:3000"
                ]
              },
              "ConnectionStrings": {
                "DefaultConnection": "Host=${{ secrets.DB_HOST }};Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }}",
                "ApiConnection": "Host=${{ secrets.DB_HOST }};Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }}"
              },
              "BearerTokens": {
                "Key": "${{ secrets.JWT_KEY }}",
                "Issuer": "${{ secrets.JWT_ISSUER }}",
                "Audience": "${{ secrets.JWT_AUDIENCE }}",
                "AccessTokenExpirationHours": 7,
                "RefreshTokenExpirationHours": 60
              },
              "Google": {
                "ClientId": "${{ secrets.GOOGLE_CLIENT_ID }}"
              },
              "Sendgrid": {
                "SendGridKey": "${{ secrets.SENDGRID_KEY }}",
                "SendGridUser": "${{ secrets.SENDGRID_USER }}",
                "UseSandbox": "false"
              },
              "LocalStorage": {
                "StorageFolder": "uploads/products",
                "BaseUrl": "http://162.220.165.172:5000/"
              }
            }
            EOF
            systemctl restart strova-api.service
            systemctl status strova-api.service